name: Deploy Production (Fibery → undersight.ai)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build site from Fibery (respects Site Mode)
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
        run: python3 build.py --verify --env production

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name undersight-website --branch main --commit-dirty=true

      - name: Report deployment to Fibery
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
        run: python3 deploy-report.py --env production --url "https://undersight.ai"

      - name: Verify deployment matches Fibery intent
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
        run: python3 deploy-report.py --verify --env production
