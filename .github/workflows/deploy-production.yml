name: Deploy Production (Fibery → undersight.ai)

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Schema guard (block stale Fibery refs)
        run: |
          echo "Checking for old schema references..."
          if grep -rn 'Website/Whitepapers\|Website/Whitepaper Leads\|Website/Whitepaper[^s]' \
            functions/ undersight-serve.py worker/index.js index.html; then
            echo "::error::Old Fibery schema names detected. Correct schema is Website/Blog, Website/Blog Leads, Website/Blog Post."
            exit 1
          fi
          echo "Schema check passed."

      - name: Build site from Fibery (respects Site Mode)
        id: build
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
        run: python3 build.py --verify --env production
        continue-on-error: true

      - name: Validate build output
        id: validate
        if: steps.build.outcome == 'success'
        run: bash tests/build-validation.sh
        continue-on-error: true

      - name: Fallback to under-construction on build failure
        if: steps.build.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: |
          echo "::warning::Build or validation failed — deploying under-construction page"
          mkdir -p dist/css dist/images/brand
          cp under-construction.html dist/index.html
          cp favicon.svg dist/ 2>/dev/null || true
          cp favicon-32.png dist/ 2>/dev/null || true
          cp favicon-16.png dist/ 2>/dev/null || true
          cp -r images/brand/ dist/images/brand/ 2>/dev/null || true
          cp css/tokens.css dist/css/ 2>/dev/null || true

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name undersight-website --branch main --commit-dirty=true

      - name: Report deployment to Fibery
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
          BUILD_STATUS: ${{ (steps.build.outcome == 'success' && steps.validate.outcome == 'success') && 'success' || (steps.build.outcome == 'failure' && 'failed' || 'degraded') }}
        run: python3 deploy-report.py --env production --url "https://undersight.ai" --status "$BUILD_STATUS"

      - name: Verify deployment matches Fibery intent
        if: steps.build.outcome == 'success' && steps.validate.outcome == 'success'
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
        run: python3 deploy-report.py --verify --env production
