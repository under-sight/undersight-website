name: Deploy Dev (Fibery → Cloudflare Pages)

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Schema guard (block stale Fibery refs)
        run: |
          echo "Checking for old schema references..."
          if grep -rn 'Website/Whitepapers\|Website/Whitepaper Leads\|Website/Whitepaper[^s]' \
            functions/ undersight-serve.py worker/index.js index.html; then
            echo "::error::Old Fibery schema names detected. Correct schema is Website/Blog, Website/Blog Leads, Website/Blog Post."
            exit 1
          fi
          echo "Schema check passed."

      - name: Build site from Fibery
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
        run: python3 build.py --verify --env dev

      - name: Deploy to Cloudflare Pages (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name undersight-website --branch dev --commit-dirty=true

      - name: Report deployment to Fibery
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
        run: python3 deploy-report.py --env dev --url "https://dev.undersight-website.pages.dev"
