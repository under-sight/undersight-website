name: Deploy Dev (Fibery → Cloudflare Pages)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build site from Fibery
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
        run: python3 build.py --verify

      - name: Deploy to Cloudflare Pages (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name undersight-website --branch dev --commit-dirty=true
