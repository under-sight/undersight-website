name: Deploy Dev (Fibery → Cloudflare Pages)

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Always check out the dev git branch. Cron triggers default GITHUB_REF
      # to the repo's default branch (main), which would deploy main's code to
      # dev.undersight-website.pages.dev — defeating the purpose of staging on
      # dev. workflow_dispatch can still override via the run-from ref.
      - uses: actions/checkout@v5
        with:
          ref: dev

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Schema guard (block stale Fibery refs)
        run: |
          echo "Checking for old schema references..."
          if grep -rn 'CMS/Whitepapers\|CMS/Whitepaper Leads\|CMS/Whitepaper[^s]' \
            functions/ undersight-serve.py worker/index.js index.html; then
            echo "::error::Old Fibery schema names detected. Correct schema is CMS/Blog, CMS/Website Leads, CMS/Blog Post."
            exit 1
          fi
          echo "Schema check passed."

      - name: Build site from Fibery
        id: build
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
          # Dev reads the staging content space; production reads CMS.
          # Mirror content with scripts/mirror-cms-to-staging.py.
          FIBERY_SPACE: "CMS Staging"
        run: python3 build.py --verify --env dev
        continue-on-error: true

      - name: Validate build output
        id: validate
        if: steps.build.outcome == 'success'
        run: bash tests/build-validation.sh
        continue-on-error: true

      - name: Link & content parity checks
        id: linkcheck
        if: steps.build.outcome == 'success'
        run: bash tests/link-check.sh
        continue-on-error: true

      - name: Fallback to under-construction on build failure
        if: steps.build.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: |
          echo "::warning::Build or validation failed — deploying under-construction page"
          mkdir -p dist/css dist/images/brand
          cp under-construction.html dist/index.html
          cp favicon.svg dist/ 2>/dev/null || true
          cp favicon-32.png dist/ 2>/dev/null || true
          cp favicon-16.png dist/ 2>/dev/null || true
          cp -r images/brand/ dist/images/brand/ 2>/dev/null || true
          cp css/tokens.css dist/css/ 2>/dev/null || true

      - name: Deploy to Cloudflare Pages (dev)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name undersight-website --branch dev --commit-dirty=true

      - name: Report deployment to Fibery
        env:
          FIBERY_TOKEN: ${{ secrets.FIBERY_TOKEN }}
          FIBERY_SPACE: "CMS Staging"
          BUILD_STATUS: ${{ (steps.build.outcome == 'success' && steps.validate.outcome == 'success' && steps.linkcheck.outcome == 'success') && 'success' || (steps.build.outcome == 'failure' && 'failed' || 'degraded') }}
        run: python3 deploy-report.py --env dev --url "https://dev.undersight-website.pages.dev" --status "$BUILD_STATUS"
