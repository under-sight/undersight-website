<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="280" height="48">
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&amp;display=swap');</style>

  <defs>
    <mask id="nib-mask">
      <!-- White = visible, Black = transparent -->
      <rect x="0" y="0" width="40" height="40" fill="white"/>
      <!-- Slit cutout -->
      <rect x="19.5" y="13" width="1" height="22" fill="black"/>
      <!-- Circle cutout -->
      <circle cx="20" cy="20" r="3" fill="black"/>
    </mask>
  </defs>

  <!-- Simplified icon (0.625x scale, centered in composition) -->
  <g transform="translate(49, 4)">
    <!-- Cap (no mask needed) -->
    <rect x="14" y="5" width="12" height="6" rx="0.5" fill="#FFFFFF"/>
    <!-- Nib body with cutouts -->
    <path d="M12 13 L28 13 L28 23 L20 35 L12 23 Z" fill="#FFFFFF" mask="url(#nib-mask)"/>
  </g>

  <!-- Wordmark -->
  <text x="101" y="32" font-family="Inter, sans-serif" font-weight="600" font-size="24" fill="#FFFFFF" letter-spacing="-0.02em">undersight</text>
</svg>
