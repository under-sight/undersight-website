<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 640px; height: 640px; background: transparent; overflow: hidden; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640">

    <!-- Background -->
    <rect width="640" height="640" rx="24" fill="#F7F8F8"/>

    <!-- STEP 1 label -->
    <text x="48" y="56" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6B7280" letter-spacing="0.1em">STEP 1</text>

    <!-- Dashboard container -->
    <rect x="40" y="76" width="560" height="520" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>

    <!-- Header bar -->
    <rect x="40" y="76" width="560" height="48" rx="16" fill="#23262C"/>
    <rect x="40" y="108" width="560" height="16" fill="#23262C"/>

    <!-- Deal name in header -->
    <text x="72" y="104" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Acme Logistics</text>
    <text x="200" y="104" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#6B7280">$150,000 / 26 wks</text>

    <!-- Status badge -->
    <rect x="480" y="90" width="88" height="24" rx="6" fill="#6B9E8C" opacity="0.2"/>
    <text x="524" y="107" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6B9E8C">Reviewing</text>

    <!-- === Risk Score Section === -->
    <g transform="translate(56, 148)">
      <text x="0" y="0" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6B7280" letter-spacing="0.06em">RISK SCORE</text>

      <!-- Score circle -->
      <circle cx="70" cy="60" r="46" fill="none" stroke="#F0F1F2" stroke-width="8"/>
      <!-- Score arc (approx 72% of circle) -->
      <circle cx="70" cy="60" r="46" fill="none" stroke="#6B9E8C" stroke-width="8" stroke-dasharray="208 289" stroke-dashoffset="72" stroke-linecap="round" transform="rotate(-90, 70, 60)"/>
      <!-- Score number -->
      <text x="70" y="56" text-anchor="middle" font-family="SF Mono, JetBrains Mono, monospace" font-size="28" font-weight="700" fill="#23262C">72</text>
      <text x="70" y="72" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#6B7280">/ 100</text>

      <!-- Score label -->
      <rect x="28" y="116" width="84" height="24" rx="6" fill="#6B9E8C" opacity="0.12"/>
      <text x="70" y="133" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6B9E8C">Low Risk</text>
    </g>

    <!-- === Key Metrics === -->
    <g transform="translate(220, 148)">
      <text x="0" y="0" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6B7280" letter-spacing="0.06em">KEY METRICS</text>

      <!-- Metric 1 -->
      <rect x="0" y="18" width="360" height="40" rx="8" fill="#F7F8F8"/>
      <text x="16" y="43" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#3A3F47">Avg Monthly Revenue</text>
      <text x="340" y="43" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#23262C">$89,400</text>

      <!-- Metric 2 -->
      <rect x="0" y="66" width="360" height="40" rx="8" fill="#F7F8F8"/>
      <text x="16" y="91" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#3A3F47">Debt Service Coverage</text>
      <text x="340" y="91" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#6B9E8C">1.8x</text>

      <!-- Metric 3 -->
      <rect x="0" y="114" width="360" height="40" rx="8" fill="#F7F8F8"/>
      <text x="16" y="139" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#3A3F47">Existing Positions</text>
      <text x="340" y="139" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#C97A54">2 active</text>
    </g>

    <!-- Divider -->
    <line x1="56" y1="320" x2="584" y2="320" stroke="#F0F1F2" stroke-width="1.5"/>

    <!-- === Signals Section === -->
    <g transform="translate(56, 340)">
      <text x="0" y="0" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6B7280" letter-spacing="0.06em">SIGNALS</text>

      <!-- Signal row 1 - positive -->
      <g transform="translate(0, 18)">
        <circle cx="8" cy="10" r="4" fill="#6B9E8C"/>
        <text x="20" y="14" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#3A3F47">Revenue trending up 12% QoQ</text>
      </g>

      <!-- Signal row 2 - positive -->
      <g transform="translate(0, 44)">
        <circle cx="8" cy="10" r="4" fill="#6B9E8C"/>
        <text x="20" y="14" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#3A3F47">Clean bank statements, no NSFs</text>
      </g>

      <!-- Signal row 3 - neutral -->
      <g transform="translate(0, 70)">
        <circle cx="8" cy="10" r="4" fill="#D1D5DB"/>
        <text x="20" y="14" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#3A3F47">Industry: Logistics (moderate cyclicality)</text>
      </g>

      <!-- Signal row 4 - caution -->
      <g transform="translate(0, 96)">
        <circle cx="8" cy="10" r="4" fill="#C97A54"/>
        <text x="20" y="14" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#3A3F47">2 existing positions reduce available margin</text>
      </g>
    </g>

    <!-- === Bottom action bar === -->
    <g transform="translate(56, 478)">
      <!-- Copilot question input -->
      <rect x="0" y="0" width="528" height="44" rx="12" fill="#F0F1F2" stroke="#D1D5DB" stroke-width="1"/>
      <text x="20" y="27" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#6B7280" opacity="0.5">Ask copilot about this deal...</text>

      <!-- Sparkle icon for AI -->
      <g transform="translate(492, 14)">
        <rect x="-4" y="-4" width="28" height="28" rx="8" fill="#C97A54" opacity="0.12"/>
        <!-- Simple sparkle/star -->
        <line x1="10" y1="2" x2="10" y2="18" stroke="#C97A54" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="10" x2="18" y2="10" stroke="#C97A54" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="4" y1="4" x2="16" y2="16" stroke="#C97A54" stroke-width="1" stroke-linecap="round"/>
        <line x1="16" y1="4" x2="4" y2="16" stroke="#C97A54" stroke-width="1" stroke-linecap="round"/>
      </g>

      <!-- Suggested action pills -->
      <g transform="translate(0, 54)">
        <rect x="0" y="0" width="120" height="28" rx="8" fill="#F0F1F2" stroke="#D1D5DB" stroke-width="1"/>
        <text x="60" y="18" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">Approve deal</text>

        <rect x="132" y="0" width="140" height="28" rx="8" fill="#F0F1F2" stroke="#D1D5DB" stroke-width="1"/>
        <text x="202" y="18" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">Request more info</text>

        <rect x="284" y="0" width="130" height="28" rx="8" fill="#F0F1F2" stroke="#D1D5DB" stroke-width="1"/>
        <text x="349" y="18" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">Compare offers</text>
      </g>
    </g>

  </svg>
</body>
</html>
