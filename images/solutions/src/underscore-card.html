<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 640px; height: 640px; background: transparent; overflow: hidden; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640">

    <!-- Background -->
    <rect width="640" height="640" rx="24" fill="#F7F8F8"/>

    <!-- STEP 1 label -->
    <text x="48" y="56" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6B7280" letter-spacing="0.1em">STEP 1</text>

    <!-- Code editor container -->
    <rect x="40" y="76" width="560" height="520" rx="16" fill="#23262C"/>

    <!-- Title bar dots -->
    <circle cx="68" cy="104" r="6" fill="#3A3F47"/>
    <circle cx="88" cy="104" r="6" fill="#3A3F47"/>
    <circle cx="108" cy="104" r="6" fill="#3A3F47"/>

    <!-- Tab -->
    <rect x="140" y="90" width="120" height="28" rx="6" fill="#1A1D21"/>
    <text x="200" y="109" text-anchor="middle" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#6B7280">request.json</text>

    <!-- Divider line below title bar -->
    <line x1="40" y1="130" x2="600" y2="130" stroke="#1A1D21" stroke-width="1"/>

    <!-- POST method badge + endpoint -->
    <rect x="68" y="154" width="46" height="22" rx="4" fill="#6B9E8C"/>
    <text x="91" y="169" text-anchor="middle" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#FFFFFF">POST</text>
    <text x="124" y="169" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" fill="#D1D5DB">/api/v1/deals</text>

    <!-- Divider -->
    <line x1="68" y1="190" x2="572" y2="190" stroke="#3A3F47" stroke-width="1"/>

    <!-- JSON body -->
    <!-- Line numbers -->
    <text x="68" y="222" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" fill="#3A3F47">1</text>
    <text x="68" y="252" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" fill="#3A3F47">2</text>
    <text x="68" y="282" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" fill="#3A3F47">3</text>
    <text x="68" y="312" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" fill="#3A3F47">4</text>
    <text x="68" y="342" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" fill="#3A3F47">5</text>
    <text x="68" y="372" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" fill="#3A3F47">6</text>
    <text x="68" y="402" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" fill="#3A3F47">7</text>
    <text x="68" y="432" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" fill="#3A3F47">8</text>

    <!-- JSON content -->
    <text x="100" y="222" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">{</text>

    <text x="120" y="252" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#C97A54">"business"</text>
    <text x="225" y="252" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">:</text>
    <text x="240" y="252" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#6B9E8C">"Acme Logistics"</text>
    <text x="413" y="252" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">,</text>

    <text x="120" y="282" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#C97A54">"amount"</text>
    <text x="210" y="282" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">:</text>
    <text x="225" y="282" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">150000</text>
    <text x="275" y="282" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">,</text>

    <text x="120" y="312" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#C97A54">"bank_statements"</text>
    <text x="295" y="312" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">:</text>
    <text x="310" y="312" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#6B9E8C">3</text>
    <text x="322" y="312" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">,</text>

    <text x="120" y="342" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#C97A54">"term_weeks"</text>
    <text x="247" y="342" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">:</text>
    <text x="262" y="342" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">26</text>
    <text x="282" y="342" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">,</text>

    <text x="120" y="372" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#C97A54">"factor_rate"</text>
    <text x="260" y="372" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">:</text>
    <text x="275" y="372" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">1.32</text>

    <text x="100" y="402" font-family="SF Mono, JetBrains Mono, monospace" font-size="13" fill="#D1D5DB">}</text>

    <!-- Cursor blink line -->
    <rect x="115" y="415" width="2" height="16" rx="1" fill="#C97A54" opacity="0.7"/>

    <!-- Status bar at bottom -->
    <rect x="40" y="556" width="560" height="40" rx="0" fill="#1A1D21"/>
    <!-- Round bottom corners to match container -->
    <rect x="40" y="556" width="560" height="24" fill="#1A1D21"/>
    <rect x="40" y="572" width="560" height="24" rx="16" fill="#1A1D21"/>

    <!-- Status dot + message -->
    <circle cx="68" cy="576" r="5" fill="#6B9E8C"/>
    <text x="82" y="580" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#6B7280">Deal submitted for scoring</text>

    <!-- Response time -->
    <text x="540" y="580" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#3A3F47">200 OK</text>
    <text x="572" y="580" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#3A3F47">42ms</text>

  </svg>
</body>
</html>
