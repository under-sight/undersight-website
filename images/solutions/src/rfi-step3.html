<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 640px; height: 640px; background: transparent; overflow: hidden; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640">

    <!-- Background -->
    <rect width="640" height="640" rx="24" fill="#F7F8F8"/>

    <!-- STEP 3 label -->
    <text x="48" y="56" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6B7280" letter-spacing="0.1em">STEP 3</text>

    <!-- Package card container -->
    <rect x="80" y="80" width="480" height="504" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>

    <!-- Package header -->
    <rect x="80" y="80" width="480" height="72" rx="16" fill="#23262C"/>
    <rect x="80" y="136" width="480" height="16" fill="#23262C"/>

    <!-- Package icon -->
    <rect x="108" y="100" width="32" height="32" rx="8" fill="#6B9E8C" opacity="0.2"/>
    <rect x="116" y="108" width="16" height="4" rx="1" fill="#FFFFFF"/>
    <rect x="116" y="115" width="16" height="4" rx="1" fill="#FFFFFF"/>
    <rect x="116" y="122" width="10" height="4" rx="1" fill="#FFFFFF"/>

    <!-- Package title -->
    <text x="152" y="113" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Acme Logistics</text>
    <text x="152" y="133" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#6B7280">Submission Package</text>

    <!-- Completion badge in header -->
    <rect x="430" y="102" width="100" height="28" rx="8" fill="#6B9E8C" opacity="0.2"/>
    <text x="480" y="120" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6B9E8C">Complete</text>

    <!-- === Section 1: Application Summary === -->
    <g transform="translate(104, 176)">
      <rect x="0" y="0" width="432" height="72" rx="10" fill="#F7F8F8"/>
      <!-- Checkmark -->
      <circle cx="28" cy="36" r="14" fill="#6B9E8C" opacity="0.12"/>
      <polyline points="22,36 26,40 34,32" fill="none" stroke="#6B9E8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Text -->
      <text x="52" y="28" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#23262C">Application Summary</text>
      <text x="52" y="46" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#6B7280">Business details, request amount, term, and use of funds</text>
      <!-- File count -->
      <text x="408" y="40" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#6B7280">1 file</text>
    </g>

    <!-- === Section 2: Bank Analysis === -->
    <g transform="translate(104, 262)">
      <rect x="0" y="0" width="432" height="72" rx="10" fill="#F7F8F8"/>
      <!-- Checkmark -->
      <circle cx="28" cy="36" r="14" fill="#6B9E8C" opacity="0.12"/>
      <polyline points="22,36 26,40 34,32" fill="none" stroke="#6B9E8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Text -->
      <text x="52" y="28" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#23262C">Bank Statement Analysis</text>
      <text x="52" y="46" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#6B7280">3 months parsed, revenue trends, balance history, NSF check</text>
      <!-- File count -->
      <text x="408" y="40" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#6B7280">3 files</text>
    </g>

    <!-- === Section 3: RFI Responses === -->
    <g transform="translate(104, 348)">
      <rect x="0" y="0" width="432" height="72" rx="10" fill="#F7F8F8"/>
      <!-- Checkmark -->
      <circle cx="28" cy="36" r="14" fill="#6B9E8C" opacity="0.12"/>
      <polyline points="22,36 26,40 34,32" fill="none" stroke="#6B9E8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Text -->
      <text x="52" y="28" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#23262C">RFI Responses</text>
      <text x="52" y="46" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#6B7280">All funder questions answered, verified against source documents</text>
      <!-- File count -->
      <text x="408" y="40" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#6B7280">12 items</text>
    </g>

    <!-- === Section 4: Risk Signals === -->
    <g transform="translate(104, 434)">
      <rect x="0" y="0" width="432" height="72" rx="10" fill="#F7F8F8"/>
      <!-- Checkmark -->
      <circle cx="28" cy="36" r="14" fill="#6B9E8C" opacity="0.12"/>
      <polyline points="22,36 26,40 34,32" fill="none" stroke="#6B9E8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Text -->
      <text x="52" y="28" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#23262C">Risk Signals</text>
      <text x="52" y="46" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#6B7280">Existing positions, stacking indicators, and anomaly flags</text>
      <!-- File count -->
      <text x="408" y="40" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#6B7280">4 signals</text>
    </g>

    <!-- === Bottom status === -->
    <g transform="translate(104, 530)">
      <rect x="0" y="0" width="432" height="44" rx="10" fill="#6B9E8C" opacity="0.08" stroke="#6B9E8C" stroke-width="1" stroke-opacity="0.3"/>
      <circle cx="24" cy="22" r="8" fill="#6B9E8C" opacity="0.2"/>
      <polyline points="19,22 22,25 29,19" fill="none" stroke="#6B9E8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="40" y="26" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6B9E8C">Ready to send</text>
      <text x="408" y="26" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#6B7280">Assembled in 4 min 12s</text>
    </g>

  </svg>
</body>
</html>
