<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 640px; height: 640px; background: transparent; overflow: hidden; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640">

    <!-- Background -->
    <rect width="640" height="640" rx="24" fill="#F7F8F8"/>

    <!-- STEP 2 label -->

    <!-- Header bar -->

      <text x="448" y="0" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#6B7280" letter-spacing="0.06em">SIGNAL</text>
    </g>

    <!-- Divider -->
    <line x1="56" y1="152" x2="584" y2="152" stroke="#F0F1F2" stroke-width="1"/>

    <!-- Transaction row 1 - normal -->
    <g transform="translate(56, 162)">
      <rect x="-8" y="-4" width="536" height="36" rx="6" fill="transparent"/>
      <text x="0" y="18" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#6B7280">03/01</text>
      <text x="100" y="18" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#3A3F47">ACH deposit - Client payment</text>
      <text x="360" y="18" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#23262C">+$12,400</text>
      <circle cx="460" cy="14" r="4" fill="#6B9E8C"/>
    </g>

    <!-- Transaction row 2 - normal -->
    <g transform="translate(56, 200)">

      <circle cx="460" cy="14" r="4" fill="#6B9E8C"/>

    <g transform="translate(56, 238)">
      <rect x="-8" y="-4" width="536" height="36" rx="6" fill="#C97A54" opacity="0.06"/>
      <rect x="-8" y="-4" width="536" height="36" rx="6" fill="none" stroke="#C97A54" stroke-width="1" opacity="0.3"/>

      <text x="100" y="18" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#C97A54">ACH debit - CFG Merchant</text>
      <text x="360" y="18" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#C97A54">-$620</text>

      <text x="360" y="18" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#23262C">+$8,750</text>
      <circle cx="460" cy="14" r="4" fill="#6B9E8C"/>
    </g>

    <!-- Transaction row 5 - HIGHLIGHTED (amber) - existing position -->

      <rect x="-8" y="-4" width="536" height="36" rx="6" fill="#C97A54" opacity="0.06"/>
      <rect x="-8" y="-4" width="536" height="36" rx="6" fill="none" stroke="#C97A54" stroke-width="1" opacity="0.3"/>
      <text x="0" y="18" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#6B7280">03/10</text>
      <text x="100" y="18" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#C97A54">ACH debit - CFG Merchant</text>
      <text x="360" y="18" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#C97A54">-$620</text>

    <!-- Transaction row 6 - normal -->

      <rect x="-8" y="-4" width="536" height="36" rx="6" fill="transparent"/>
      <text x="0" y="18" font-family="SF Mono, JetBrains Mono, monospace" font-size="10" fill="#6B7280">03/12</text>
      <text x="100" y="18" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#3A3F47">ACH deposit - Client payment</text>

    <!-- Divider before insights -->

    <!-- === AI Insights sidebar/bottom panel === -->
    <g transform="translate(56, 412)">
      <text x="0" y="0" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6B7280" letter-spacing="0.06em">AI INSIGHTS</text>

      <!-- Insight card 1 -->
      <rect x="0" y="16" width="252" height="56" rx="8" fill="#6B9E8C" opacity="0.06" stroke="#6B9E8C" stroke-width="1" stroke-opacity="0.2"/>
      <circle cx="18" cy="44" r="6" fill="#6B9E8C"/>

      <!-- Insight card 2 -->
      <rect x="268" y="16" width="252" height="56" rx="8" fill="#C97A54" opacity="0.06" stroke="#C97A54" stroke-width="1" stroke-opacity="0.2"/>

      <circle cx="18" cy="112" r="6" fill="#6B9E8C"/>
      <text x="32" y="106" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3A3F47">Anomalies</text>
      <text x="32" y="124" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#6B9E8C">None detected</text>

      <text x="300" y="124" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#6B9E8C">0 occurrences</text>
