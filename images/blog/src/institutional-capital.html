<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 800px; height: 533px; background: #EBEBEB; overflow: hidden; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" width="800" height="533">

    <!-- Background -->
    <rect width="800" height="533" fill="#EBEBEB"/>

    <!-- Decorative accent circles -->
    <circle cx="55" cy="55" r="10" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    <circle cx="745" cy="65" r="6" fill="#D1D5DB" opacity="0.4"/>
    <circle cx="720" cy="475" r="12" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    <circle cx="90" cy="485" r="5" fill="#D1D5DB" opacity="0.5"/>

    <!-- ===== LEFT: Scattered raw documents (unstructured MCA data) ===== -->
    <g transform="translate(40, 100)">
      <!-- Document 1 (tilted) -->
      <g transform="rotate(-8, 80, 120)">
        <rect x="30" y="60" width="100" height="130" rx="4" fill="#FFFFFF" stroke="#6B7280" stroke-width="1.5"/>
        <line x1="44" y1="82" x2="116" y2="82" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="44" y1="96" x2="100" y2="96" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="44" y1="110" x2="110" y2="110" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="44" y1="124" x2="90" y2="124" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="44" y1="138" x2="106" y2="138" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="44" y1="152" x2="80" y2="152" stroke="#D1D5DB" stroke-width="1"/>
        <!-- Dollar sign watermark -->
        <text x="80" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#D1D5DB" opacity="0.3">$</text>
      </g>

      <!-- Document 2 (tilted other way) -->
      <g transform="rotate(5, 120, 160)">
        <rect x="60" y="100" width="100" height="130" rx="4" fill="#FFFFFF" stroke="#6B7280" stroke-width="1.5"/>
        <line x1="74" y1="122" x2="146" y2="122" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="74" y1="136" x2="130" y2="136" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="74" y1="150" x2="140" y2="150" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="74" y1="164" x2="120" y2="164" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="74" y1="178" x2="136" y2="178" stroke="#D1D5DB" stroke-width="1"/>
        <!-- Chart icon -->
        <rect x="76" y="192" width="30" height="20" rx="2" fill="none" stroke="#6B7280" stroke-width="1"/>
        <polyline points="80,208 88,200 96,204 102,196" fill="none" stroke="#6B7280" stroke-width="1" stroke-linecap="round"/>
      </g>

      <!-- Document 3 (straight, on top) -->
      <rect x="20" y="140" width="100" height="130" rx="4" fill="#FFFFFF" stroke="#3A3F47" stroke-width="1.5"/>
      <rect x="20" y="140" width="100" height="22" rx="4" fill="#3A3F47"/>
      <rect x="20" y="158" width="100" height="4" fill="#3A3F47"/>
      <text x="70" y="156" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#FFFFFF">BANK STATEMENT</text>
      <line x1="34" y1="178" x2="106" y2="178" stroke="#D1D5DB" stroke-width="1"/>
      <line x1="34" y1="192" x2="90" y2="192" stroke="#D1D5DB" stroke-width="1"/>
      <line x1="34" y1="206" x2="100" y2="206" stroke="#D1D5DB" stroke-width="1"/>
      <line x1="34" y1="220" x2="76" y2="220" stroke="#D1D5DB" stroke-width="1"/>
      <rect x="34" y="236" width="40" height="16" rx="2" fill="#EBEBEB" stroke="#6B7280" stroke-width="1"/>
      <text x="54" y="248" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" fill="#6B7280">$42K</text>

      <!-- Label -->
      <text x="90" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6B7280">Raw MCA Data</text>
    </g>

    <!-- ===== CENTER: Large padlock, opening ===== -->
    <g transform="translate(310, 80)">
      <!-- Lock shackle (open position - rotated up-right) -->
      <path d="M 60,180 L 60,120 Q 60,80 90,80 Q 120,80 120,120 L 120,140"
            fill="none" stroke="#3A3F47" stroke-width="6" stroke-linecap="round"/>
      <!-- Open shackle end lifts away -->
      <path d="M 60,180 L 60,130 Q 60,96 82,86"
            fill="none" stroke="#23262C" stroke-width="6" stroke-linecap="round"/>

      <!-- Lock body -->
      <rect x="40" y="180" width="100" height="80" rx="8" fill="#3A3F47" stroke="#23262C" stroke-width="2"/>

      <!-- Keyhole -->
      <circle cx="90" cy="210" r="10" fill="#23262C"/>
      <rect x="86" y="216" width="8" height="18" rx="2" fill="#23262C"/>

      <!-- Glow/unlock indicator lines radiating from keyhole -->
      <line x1="68" y1="200" x2="56" y2="192" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="68" y1="216" x2="54" y2="220" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="112" y1="200" x2="124" y2="192" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="112" y1="216" x2="126" y2="220" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Small sparkle marks around the lock (unlocking energy) -->
      <g stroke="#6B7280" stroke-width="1" stroke-linecap="round">
        <line x1="30" y1="160" x2="24" y2="150"/>
        <line x1="20" y1="168" x2="30" y2="164"/>
        <line x1="150" y1="165" x2="158" y2="155"/>
        <line x1="155" y1="175" x2="162" y2="170"/>
        <line x1="44" y1="270" x2="36" y2="278"/>
        <line x1="136" y1="270" x2="144" y2="278"/>
      </g>

      <!-- Label -->
      <text x="90" y="296" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#23262C">Unlocking Access</text>
    </g>

    <!-- ===== Flow arrows: documents → lock → structured output ===== -->
    <!-- Left arrow (docs to lock) -->
    <g stroke="#3A3F47" stroke-width="1.5">
      <line x1="232" y1="280" x2="310" y2="280" stroke-dasharray="6,4"/>
      <polygon points="306,276 314,280 306,284" fill="#3A3F47"/>
    </g>

    <!-- Right arrow (lock to structured) -->
    <g stroke="#3A3F47" stroke-width="1.5">
      <line x1="490" y1="280" x2="548" y2="280" stroke-dasharray="6,4"/>
      <polygon points="544,276 552,280 544,284" fill="#3A3F47"/>
    </g>

    <!-- ===== RIGHT: Structured, certified output (institutional-grade) ===== -->
    <g transform="translate(556, 100)">
      <!-- Main structured document -->
      <rect x="0" y="60" width="160" height="200" rx="6" fill="#FFFFFF" stroke="#23262C" stroke-width="2"/>

      <!-- Header bar -->
      <rect x="0" y="60" width="160" height="28" rx="6" fill="#23262C"/>
      <rect x="0" y="82" width="160" height="6" fill="#23262C"/>
      <text x="72" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#FFFFFF" letter-spacing="0.03em">SECURITIZATION READY</text>

      <!-- Structured data rows with labels -->
      <text x="16" y="110" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#3A3F47">DATA INTEGRITY</text>
      <rect x="16" y="114" width="128" height="6" rx="2" fill="#3A3F47"/>

      <text x="16" y="138" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#3A3F47">PAYMENT STABILITY</text>
      <rect x="16" y="142" width="110" height="6" rx="2" fill="#6B7280"/>

      <text x="16" y="166" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#3A3F47">SERVICING CONTINUITY</text>
      <rect x="16" y="170" width="120" height="6" rx="2" fill="#6B7280"/>

      <text x="16" y="194" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#3A3F47">BUYBACK DISCIPLINE</text>
      <rect x="16" y="198" width="100" height="6" rx="2" fill="#3A3F47"/>

      <!-- Rating badge -->
      <rect x="40" y="220" width="80" height="28" rx="6" fill="#EBEBEB" stroke="#3A3F47" stroke-width="1.5"/>
      <text x="80" y="232" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" font-weight="600" fill="#6B7280">RATED</text>
      <text x="80" y="243" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" font-weight="700" fill="#23262C">A-</text>

      <!-- Verification checkmark -->
      <circle cx="144" cy="72" r="12" fill="#3A3F47"/>
      <polyline points="138,72 142,76 150,66" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Label -->
      <text x="80" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#23262C">Institutional Grade</text>
    </g>

  </svg>
</body>
</html>
