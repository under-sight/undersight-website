<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 800px; height: 533px; background: #EBEBEB; overflow: hidden; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" width="800" height="533">
    <defs>
      <!-- Subtle glow for active particles -->
      <filter id="glow-amber" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- Background -->
    <rect width="800" height="533" fill="#EBEBEB"/>

    <!-- ===== FIELD: Grid of evenly spaced dots ===== -->
    <g opacity="0.35">
      <!-- Row pattern: dots every 32px, offset from edges -->
      <!-- Using a pattern for efficiency -->
    </g>
    <pattern id="field-dots" x="16" y="16" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.2" fill="#D1D5DB"/>
    </pattern>
    <rect width="800" height="533" fill="url(#field-dots)" opacity="0.6"/>

    <!-- ===== Decorative accent circles (corners) ===== -->
    <circle cx="56" cy="44" r="8" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    <circle cx="748" cy="52" r="6" fill="#D1D5DB" opacity="0.35"/>
    <circle cx="730" cy="488" r="10" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    <circle cx="72" cy="496" r="4" fill="#D1D5DB" opacity="0.4"/>
    <circle cx="36" cy="260" r="5" fill="none" stroke="#D1D5DB" stroke-width="0.8"/>
    <circle cx="768" cy="280" r="7" fill="none" stroke="#D1D5DB" stroke-width="0.8"/>

    <!-- ===== CONNECTION LINES (drawn first, behind particles) ===== -->
    <!-- Lines converging toward center cluster -->
    <!-- Revenue to center -->
    <line x1="180" y1="160" x2="340" y2="250" stroke="#D1D5DB" stroke-width="1" opacity="0.7"/>
    <!-- Bank Data to center -->
    <line x1="160" y1="360" x2="350" y2="290" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
    <!-- Risk Score to center -->
    <line x1="620" y1="180" x2="460" y2="260" stroke="#D1D5DB" stroke-width="1" opacity="0.7"/>
    <!-- Positions to center -->
    <line x1="640" y1="380" x2="460" y2="290" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
    <!-- Audit Trail to center -->
    <line x1="300" y1="420" x2="380" y2="310" stroke="#D1D5DB" stroke-width="1" opacity="0.5"/>

    <!-- Internal cluster connections -->
    <line x1="370" y1="255" x2="420" y2="270" stroke="#3A3F47" stroke-width="0.8" opacity="0.5"/>
    <line x1="420" y1="270" x2="440" y2="250" stroke="#3A3F47" stroke-width="0.8" opacity="0.5"/>
    <line x1="400" y1="280" x2="370" y2="295" stroke="#3A3F47" stroke-width="0.8" opacity="0.4"/>
    <line x1="370" y1="295" x2="400" y2="310" stroke="#3A3F47" stroke-width="0.8" opacity="0.4"/>
    <line x1="440" y1="250" x2="460" y2="275" stroke="#3A3F47" stroke-width="0.8" opacity="0.5"/>
    <line x1="400" y1="280" x2="430" y2="300" stroke="#3A3F47" stroke-width="0.8" opacity="0.4"/>

    <!-- Secondary connection lines (lighter, more distant) -->
    <line x1="240" y1="120" x2="180" y2="160" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
    <line x1="680" y1="140" x2="620" y2="180" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
    <line x1="120" y1="300" x2="160" y2="360" stroke="#D1D5DB" stroke-width="0.8" opacity="0.3"/>
    <line x1="700" y1="420" x2="640" y2="380" stroke="#D1D5DB" stroke-width="0.8" opacity="0.3"/>
    <line x1="520" y1="440" x2="460" y2="290" stroke="#D1D5DB" stroke-width="0.6" stroke-dasharray="4,4" opacity="0.3"/>

    <!-- ===== OUTER PARTICLES (smaller, peripheral) ===== -->
    <!-- Distant neutral particles -->
    <circle cx="240" cy="120" r="3" fill="#6B7280" opacity="0.4"/>
    <circle cx="680" cy="140" r="2.5" fill="#6B7280" opacity="0.35"/>
    <circle cx="120" cy="300" r="2" fill="#6B7280" opacity="0.3"/>
    <circle cx="700" cy="420" r="2.5" fill="#6B7280" opacity="0.35"/>
    <circle cx="520" cy="440" r="2" fill="#6B7280" opacity="0.3"/>
    <circle cx="500" cy="120" r="2" fill="#6B7280" opacity="0.3"/>
    <circle cx="300" cy="480" r="2.5" fill="#6B7280" opacity="0.3"/>
    <circle cx="560" cy="460" r="2" fill="#6B7280" opacity="0.25"/>

    <!-- ===== KEY DATA PARTICLES (labeled) ===== -->

    <!-- REVENUE particle (amber - active signal) -->
    <g filter="url(#glow-amber)">
      <circle cx="180" cy="160" r="10" fill="#C97A54" opacity="0.9"/>
    </g>
    <circle cx="180" cy="160" r="10" fill="none" stroke="#C97A54" stroke-width="1.5" opacity="0.4"/>
    <circle cx="180" cy="160" r="16" fill="none" stroke="#C97A54" stroke-width="0.5" opacity="0.25"/>
    <text x="180" y="140" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="9" font-weight="500" fill="#3A3F47" letter-spacing="0.03em">Revenue</text>

    <!-- BANK DATA particle (eucalyptus - verified) -->
    <g filter="url(#glow-green)">
      <circle cx="160" cy="360" r="11" fill="#6B9E8C" opacity="0.85"/>
    </g>
    <circle cx="160" cy="360" r="11" fill="none" stroke="#6B9E8C" stroke-width="1.5" opacity="0.35"/>
    <circle cx="160" cy="360" r="18" fill="none" stroke="#6B9E8C" stroke-width="0.5" opacity="0.2"/>
    <text x="160" y="340" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="9" font-weight="500" fill="#3A3F47" letter-spacing="0.03em">Bank Data</text>

    <!-- RISK SCORE particle (amber - active signal) -->
    <g filter="url(#glow-amber)">
      <circle cx="620" cy="180" r="9" fill="#C97A54" opacity="0.85"/>
    </g>
    <circle cx="620" cy="180" r="9" fill="none" stroke="#C97A54" stroke-width="1.5" opacity="0.4"/>
    <circle cx="620" cy="180" r="15" fill="none" stroke="#C97A54" stroke-width="0.5" opacity="0.2"/>
    <text x="620" y="162" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="9" font-weight="500" fill="#3A3F47" letter-spacing="0.03em">Risk Score</text>

    <!-- POSITIONS particle (eucalyptus - verified) -->
    <g filter="url(#glow-green)">
      <circle cx="640" cy="380" r="10" fill="#6B9E8C" opacity="0.85"/>
    </g>
    <circle cx="640" cy="380" r="10" fill="none" stroke="#6B9E8C" stroke-width="1.5" opacity="0.35"/>
    <circle cx="640" cy="380" r="16" fill="none" stroke="#6B9E8C" stroke-width="0.5" opacity="0.2"/>
    <text x="640" y="362" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="9" font-weight="500" fill="#3A3F47" letter-spacing="0.03em">Positions</text>

    <!-- AUDIT TRAIL particle (graphite - neutral) -->
    <circle cx="300" cy="420" r="8" fill="#3A3F47" opacity="0.75"/>
    <circle cx="300" cy="420" r="8" fill="none" stroke="#3A3F47" stroke-width="1" opacity="0.3"/>
    <circle cx="300" cy="420" r="14" fill="none" stroke="#3A3F47" stroke-width="0.5" opacity="0.2"/>
    <text x="300" y="404" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="9" font-weight="500" fill="#3A3F47" letter-spacing="0.03em">Audit Trail</text>

    <!-- ===== CENTRAL CLUSTER (convergence zone) ===== -->

    <!-- Subtle convergence ring -->
    <circle cx="400" cy="275" r="60" fill="none" stroke="#D1D5DB" stroke-width="0.6" stroke-dasharray="3,5" opacity="0.5"/>
    <circle cx="400" cy="275" r="40" fill="none" stroke="#3A3F47" stroke-width="0.4" stroke-dasharray="2,4" opacity="0.3"/>

    <!-- Central cluster particles -->
    <circle cx="370" cy="255" r="5" fill="#3A3F47" opacity="0.7"/>
    <circle cx="420" cy="270" r="6" fill="#C97A54" opacity="0.8"/>
    <circle cx="440" cy="250" r="4" fill="#6B9E8C" opacity="0.75"/>
    <circle cx="400" cy="280" r="5" fill="#3A3F47" opacity="0.6"/>
    <circle cx="370" cy="295" r="4" fill="#6B9E8C" opacity="0.7"/>
    <circle cx="430" cy="300" r="4.5" fill="#C97A54" opacity="0.65"/>
    <circle cx="460" cy="275" r="3.5" fill="#3A3F47" opacity="0.5"/>
    <circle cx="380" cy="270" r="3" fill="#6B7280" opacity="0.5"/>
    <circle cx="410" cy="255" r="3.5" fill="#6B7280" opacity="0.5"/>
    <circle cx="395" cy="305" r="3" fill="#6B7280" opacity="0.4"/>

    <!-- ===== FOCAL SCORE: "72" ===== -->
    <circle cx="400" cy="275" r="22" fill="#FFFFFF" stroke="#23262C" stroke-width="2"/>
    <text x="400" y="271" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="20" font-weight="700" fill="#23262C">72</text>
    <text x="400" y="287" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="7" font-weight="500" fill="#6B7280" letter-spacing="0.05em">SCORE</text>

    <!-- ===== "4D Financing" label at bottom ===== -->
    <text x="400" y="498" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#23262C" letter-spacing="0.02em">4D Financing</text>
    <text x="400" y="516" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" font-weight="400" fill="#6B7280">Institutional-grade underwriting from a field of intelligence</text>

  </svg>
</body>
</html>
