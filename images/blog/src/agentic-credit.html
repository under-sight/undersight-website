<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 800px; height: 533px; background: #EBEBEB; overflow: hidden; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" width="800" height="533">

    <!-- Background -->
    <rect width="800" height="533" fill="#EBEBEB"/>

    <!-- Decorative accent circles -->
    <circle cx="50" cy="50" r="10" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    <circle cx="750" cy="70" r="6" fill="#D1D5DB" opacity="0.4"/>
    <circle cx="730" cy="470" r="14" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    <circle cx="80" cy="490" r="4" fill="#D1D5DB" opacity="0.5"/>

    <!-- ===== LEFT SIDE: Deterministic Scorecard (lighter/fading) ===== -->
    <g transform="translate(60, 90)" opacity="0.85">
      <!-- Clipboard body -->
      <rect x="0" y="20" width="200" height="300" rx="8" fill="#FFFFFF" stroke="#6B7280" stroke-width="2"/>

      <!-- Clipboard clip -->
      <rect x="70" y="8" width="60" height="24" rx="4" fill="#6B7280"/>
      <rect x="80" y="4" width="40" height="12" rx="6" fill="#EBEBEB" stroke="#6B7280" stroke-width="1.5"/>

      <!-- Title bar -->
      <rect x="16" y="44" width="168" height="24" rx="4" fill="#D1D5DB" opacity="0.6"/>
      <text x="100" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#6B7280">CREDIT SCORECARD</text>

      <!-- Checkbox rows (rigid, grid-like) -->
      <!-- Row 1 - checked -->
      <rect x="24" y="84" width="14" height="14" rx="2" fill="#D1D5DB" stroke="#6B7280" stroke-width="1.2"/>
      <polyline points="27,91 31,95 37,87" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="48" y="86" width="100" height="8" rx="2" fill="#D1D5DB" opacity="0.7"/>

      <!-- Row 2 - checked -->
      <rect x="24" y="114" width="14" height="14" rx="2" fill="#D1D5DB" stroke="#6B7280" stroke-width="1.2"/>
      <polyline points="27,121 31,125 37,117" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="48" y="116" width="120" height="8" rx="2" fill="#D1D5DB" opacity="0.7"/>

      <!-- Row 3 - checked -->
      <rect x="24" y="144" width="14" height="14" rx="2" fill="#D1D5DB" stroke="#6B7280" stroke-width="1.2"/>
      <polyline points="27,151 31,155 37,147" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="48" y="146" width="80" height="8" rx="2" fill="#D1D5DB" opacity="0.7"/>

      <!-- Row 4 - X (failed) -->
      <rect x="24" y="174" width="14" height="14" rx="2" fill="none" stroke="#6B7280" stroke-width="1.2"/>
      <line x1="27" y1="177" x2="35" y2="185" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="35" y1="177" x2="27" y2="185" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="48" y="176" width="110" height="8" rx="2" fill="#D1D5DB" opacity="0.7"/>

      <!-- Row 5 - empty -->
      <rect x="24" y="204" width="14" height="14" rx="2" fill="none" stroke="#D1D5DB" stroke-width="1.2"/>
      <rect x="48" y="206" width="90" height="8" rx="2" fill="#D1D5DB" opacity="0.5"/>

      <!-- Score box at bottom -->
      <rect x="24" y="244" width="152" height="48" rx="4" fill="#EBEBEB" stroke="#D1D5DB" stroke-width="1"/>
      <text x="100" y="264" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#6B7280">SCORE</text>
      <text x="100" y="282" text-anchor="middle" font-family="SF Mono, monospace" font-size="18" font-weight="700" fill="#6B7280">642</text>

      <!-- Label below -->
      <text x="100" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6B7280">Deterministic</text>
    </g>

    <!-- ===== CENTER: Transformation Arrow ===== -->
    <g transform="translate(310, 180)">
      <!-- Arrow body - morphing from angular to organic -->
      <!-- Angular left portion -->
      <polygon points="0,70 60,70 60,40 60,100 60,70" fill="none" stroke="#3A3F47" stroke-width="0"/>

      <!-- Main arrow shape -->
      <path d="M 10,86 L 10,70 L 110,70 L 110,50 L 170,86 L 110,122 L 110,102 L 10,102 Z"
            fill="#3A3F47" opacity="0.15" stroke="#3A3F47" stroke-width="1.5"/>

      <!-- Internal transformation lines -->
      <!-- Left side: straight rigid lines -->
      <line x1="24" y1="76" x2="24" y2="96" stroke="#6B7280" stroke-width="1"/>
      <line x1="36" y1="76" x2="36" y2="96" stroke="#6B7280" stroke-width="1"/>
      <line x1="48" y1="76" x2="48" y2="96" stroke="#6B7280" stroke-width="1"/>

      <!-- Right side: curved organic lines -->
      <path d="M 100,76 Q 108,86 100,96" fill="none" stroke="#3A3F47" stroke-width="1"/>
      <path d="M 112,72 Q 124,86 112,100" fill="none" stroke="#3A3F47" stroke-width="1"/>
      <path d="M 124,68 Q 140,86 124,104" fill="none" stroke="#3A3F47" stroke-width="1"/>

      <!-- Middle transition: dots getting connected -->
      <circle cx="64" cy="82" r="2" fill="#6B7280"/>
      <circle cx="76" cy="78" r="2" fill="#6B7280"/>
      <circle cx="76" cy="90" r="2.5" fill="#3A3F47"/>
      <circle cx="88" cy="84" r="2" fill="#3A3F47"/>
      <line x1="76" y1="90" x2="88" y2="84" stroke="#3A3F47" stroke-width="0.8"/>
      <line x1="76" y1="78" x2="76" y2="90" stroke="#6B7280" stroke-width="0.8"/>
    </g>

    <!-- ===== RIGHT SIDE: Agentic Neural Network (darker/present) ===== -->
    <g transform="translate(520, 80)">
      <!-- Outer container circle/rounded shape -->
      <rect x="0" y="20" width="220" height="300" rx="16" fill="#FFFFFF" stroke="#23262C" stroke-width="2"/>

      <!-- Header -->
      <rect x="0" y="20" width="220" height="32" rx="16" fill="#23262C"/>
      <rect x="0" y="40" width="220" height="12" fill="#23262C"/>
      <text x="110" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" letter-spacing="0.04em">AGENTIC ASSESSMENT</text>

      <!-- Central brain/network visualization -->
      <!-- Large central node -->
      <circle cx="110" cy="140" r="20" fill="#23262C"/>
      <circle cx="110" cy="140" r="12" fill="#2E3138" stroke="#3A3F47" stroke-width="1"/>
      <!-- Inner brain pattern -->
      <path d="M 104,135 Q 110,130 116,135 Q 120,140 116,145 Q 110,150 104,145 Q 100,140 104,135" fill="none" stroke="#6B7280" stroke-width="1"/>

      <!-- Satellite nodes (data sources radiating out) -->
      <!-- Top -->
      <circle cx="110" cy="84" r="10" fill="#EBEBEB" stroke="#3A3F47" stroke-width="1.5"/>
      <rect x="104" y="80" width="12" height="8" rx="1" fill="#3A3F47"/>
      <line x1="110" y1="94" x2="110" y2="120" stroke="#3A3F47" stroke-width="1.5"/>

      <!-- Top-right -->
      <circle cx="170" cy="100" r="10" fill="#EBEBEB" stroke="#3A3F47" stroke-width="1.5"/>
      <text x="170" y="104" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" font-weight="600" fill="#3A3F47">%</text>
      <line x1="162" y1="107" x2="128" y2="130" stroke="#3A3F47" stroke-width="1.5"/>

      <!-- Top-left -->
      <circle cx="50" cy="100" r="10" fill="#EBEBEB" stroke="#3A3F47" stroke-width="1.5"/>
      <text x="50" y="104" text-anchor="middle" font-family="SF Mono, monospace" font-size="8" font-weight="600" fill="#3A3F47">$</text>
      <line x1="58" y1="107" x2="92" y2="130" stroke="#3A3F47" stroke-width="1.5"/>

      <!-- Bottom-right -->
      <circle cx="170" cy="180" r="10" fill="#EBEBEB" stroke="#3A3F47" stroke-width="1.5"/>
      <rect x="164" y="176" width="12" height="8" rx="1" fill="#3A3F47"/>
      <line x1="162" y1="173" x2="128" y2="150" stroke="#3A3F47" stroke-width="1.5"/>

      <!-- Bottom-left -->
      <circle cx="50" cy="180" r="10" fill="#EBEBEB" stroke="#3A3F47" stroke-width="1.5"/>
      <path d="M 45,178 L 50,173 L 55,178 L 50,183 Z" fill="#3A3F47"/>
      <line x1="58" y1="173" x2="92" y2="150" stroke="#3A3F47" stroke-width="1.5"/>

      <!-- Cross-connections (subtle) -->
      <line x1="58" y1="107" x2="162" y2="107" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="3,3"/>
      <line x1="58" y1="173" x2="162" y2="173" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="3,3"/>

      <!-- Output section at bottom -->
      <line x1="20" y1="216" x2="200" y2="216" stroke="#D1D5DB" stroke-width="1"/>

      <!-- Dynamic output bars (varying widths = adaptive) -->
      <rect x="28" y="230" width="140" height="10" rx="3" fill="#3A3F47"/>
      <rect x="28" y="248" width="100" height="10" rx="3" fill="#6B7280"/>
      <rect x="28" y="266" width="164" height="10" rx="3" fill="#3A3F47"/>
      <rect x="28" y="284" width="80" height="10" rx="3" fill="#6B7280"/>

      <!-- Confidence indicators -->
      <text x="178" y="239" font-family="SF Mono, monospace" font-size="8" fill="#3A3F47">94%</text>
      <text x="138" y="257" font-family="SF Mono, monospace" font-size="8" fill="#6B7280">78%</text>
      <text x="200" y="275" font-family="SF Mono, monospace" font-size="8" fill="#3A3F47">91%</text>
      <text x="118" y="293" font-family="SF Mono, monospace" font-size="8" fill="#6B7280">85%</text>

      <!-- Label below -->
      <text x="110" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#23262C">Agentic</text>
    </g>

  </svg>
</body>
</html>
