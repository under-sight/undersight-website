<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 800px; height: 533px; background: #EBEBEB; overflow: hidden; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" width="800" height="533">

    <!-- Background -->
    <rect width="800" height="533" fill="#EBEBEB"/>

    <!-- Subtle decorative dots -->
    <circle cx="50" cy="40" r="3" fill="#D1D5DB" opacity="0.5"/>
    <circle cx="750" cy="50" r="4" fill="#D1D5DB" opacity="0.4"/>
    <circle cx="740" cy="490" r="3" fill="#D1D5DB" opacity="0.5"/>
    <circle cx="60" cy="500" r="4" fill="#D1D5DB" opacity="0.3"/>

    <!-- ===== Main container ===== -->
    <rect x="60" y="50" width="680" height="433" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>

    <!-- ===== Header bar ===== -->
    <rect x="60" y="50" width="680" height="44" rx="16" fill="#23262C"/>
    <rect x="60" y="78" width="680" height="16" fill="#23262C"/>

    <!-- Header content -->
    <text x="92" y="78" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Underwriting Copilot</text>

    <!-- Status indicator -->
    <circle cx="210" cy="74" r="4" fill="#6B9E8C"/>
    <text x="220" y="78" font-family="Inter, -apple-system, sans-serif" font-size="9" fill="#6B7280">Active</text>

    <!-- Window controls -->
    <circle cx="700" cy="74" r="5" fill="#3A3F47" stroke="#6B7280" stroke-width="0.5"/>
    <circle cx="716" cy="74" r="5" fill="#3A3F47" stroke="#6B7280" stroke-width="0.5"/>
    <circle cx="732" cy="74" r="5" fill="#3A3F47" stroke="#6B7280" stroke-width="0.5"/>

    <!-- ===== Vertical divider ===== -->
    <line x1="400" y1="94" x2="400" y2="483" stroke="#D1D5DB" stroke-width="1"/>

    <!-- ===== LEFT PANEL: Deal Data ===== -->
    <g transform="translate(76, 110)">
      <!-- Section label -->
      <text x="0" y="0" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#6B7280" letter-spacing="0.08em">DEAL SUMMARY</text>

      <!-- Applicant card -->
      <rect x="0" y="16" width="308" height="56" rx="8" fill="#F7F8F8"/>
      <text x="16" y="36" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#23262C">Meridian Transport LLC</text>
      <text x="16" y="54" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#6B7280">Freight &amp; Logistics  |  Est. 2019  |  Phoenix, AZ</text>

      <!-- Metrics grid -->
      <text x="0" y="96" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#6B7280" letter-spacing="0.08em">KEY METRICS</text>

      <!-- Row 1 -->
      <rect x="0" y="110" width="308" height="36" rx="6" fill="#F7F8F8"/>
      <text x="16" y="133" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">Requested Amount</text>
      <text x="292" y="133" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#23262C">$200,000</text>

      <!-- Row 2 -->
      <rect x="0" y="152" width="308" height="36" rx="6" fill="#FFFFFF"/>
      <text x="16" y="175" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">Avg Monthly Revenue</text>
      <text x="292" y="175" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#23262C">$124,600</text>

      <!-- Row 3 -->
      <rect x="0" y="194" width="308" height="36" rx="6" fill="#F7F8F8"/>
      <text x="16" y="217" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">Debt-to-Revenue</text>
      <text x="292" y="217" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#6B9E8C">0.18x</text>

      <!-- Row 4 -->
      <rect x="0" y="236" width="308" height="36" rx="6" fill="#FFFFFF"/>
      <text x="16" y="259" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">Existing Positions</text>
      <text x="292" y="259" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#C97A54">1 active</text>

      <!-- Row 5 -->
      <rect x="0" y="278" width="308" height="36" rx="6" fill="#F7F8F8"/>
      <text x="16" y="301" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">Time in Business</text>
      <text x="292" y="301" text-anchor="end" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#23262C">5.2 yrs</text>

      <!-- Risk score pill -->
      <rect x="0" y="328" width="80" height="28" rx="6" fill="#6B9E8C" opacity="0.12"/>
      <text x="40" y="347" text-anchor="middle" font-family="SF Mono, JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#6B9E8C">76</text>
      <text x="100" y="347" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#6B7280">Risk Score — Low</text>
    </g>

    <!-- ===== RIGHT PANEL: AI Chat ===== -->
    <g transform="translate(416, 110)">
      <!-- Section label -->
      <text x="0" y="0" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#6B7280" letter-spacing="0.08em">COPILOT ANALYSIS</text>

      <!-- User question bubble -->
      <rect x="60" y="20" width="248" height="44" rx="10" fill="#23262C"/>
      <text x="76" y="38" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#FFFFFF">What's the stacking risk here?</text>
      <text x="76" y="52" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#FFFFFF">Should I be concerned?</text>

      <!-- AI response bubble -->
      <rect x="0" y="80" width="300" height="160" rx="10" fill="#F7F8F8" stroke="#D1D5DB" stroke-width="1"/>

      <!-- AI sparkle icon -->
      <g transform="translate(12, 92)">
        <circle cx="8" cy="8" r="8" fill="#C97A54" opacity="0.12"/>
        <line x1="8" y1="3" x2="8" y2="13" stroke="#C97A54" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="3" y1="8" x2="13" y2="8" stroke="#C97A54" stroke-width="1.2" stroke-linecap="round"/>
      </g>

      <text x="36" y="103" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#23262C">Copilot</text>

      <!-- Response text -->
      <text x="16" y="124" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">Stacking exposure is manageable. The existing</text>
      <text x="16" y="138" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">position ($45K remaining) brings total debt-to-</text>
      <text x="16" y="152" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#3A3F47">revenue to 0.38x — still within threshold.</text>

      <!-- Insight highlight -->
      <rect x="16" y="164" width="268" height="32" rx="6" fill="#6B9E8C" opacity="0.08" stroke="#6B9E8C" stroke-width="0.5"/>
      <text x="28" y="178" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#6B9E8C">INSIGHT</text>
      <text x="28" y="191" font-family="Inter, -apple-system, sans-serif" font-size="9" fill="#3A3F47">Revenue growth (+14% QoQ) offsets stacking risk.</text>

      <!-- Confidence badge -->
      <rect x="16" y="204" width="90" height="22" rx="4" fill="#F7F8F8" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="61" y="219" text-anchor="middle" font-family="SF Mono, JetBrains Mono, monospace" font-size="9" fill="#6B7280">Conf: 0.91</text>

      <!-- Suggested follow-ups -->
      <text x="0" y="270" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#6B7280" letter-spacing="0.08em">FOLLOW-UP</text>

      <rect x="0" y="284" width="174" height="28" rx="8" fill="#F7F8F8" stroke="#D1D5DB" stroke-width="1"/>
      <text x="14" y="303" font-family="Inter, -apple-system, sans-serif" font-size="9" fill="#3A3F47">Show revenue breakdown</text>

      <rect x="182" y="284" width="126" height="28" rx="8" fill="#F7F8F8" stroke="#D1D5DB" stroke-width="1"/>
      <text x="196" y="303" font-family="Inter, -apple-system, sans-serif" font-size="9" fill="#3A3F47">Compare offers</text>

      <!-- Bottom input area -->
      <rect x="0" y="328" width="308" height="36" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
      <text x="16" y="351" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#6B7280" opacity="0.5">Ask about this deal...</text>

      <!-- Send icon -->
      <g transform="translate(280, 339)">
        <circle cx="8" cy="8" r="10" fill="#C97A54" opacity="0.12"/>
        <polygon points="5,5 13,8 5,11" fill="#C97A54"/>
      </g>
    </g>

  </svg>
</body>
</html>
