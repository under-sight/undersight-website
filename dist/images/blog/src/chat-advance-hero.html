<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 800px; height: 533px; background: #EBEBEB; overflow: hidden; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" width="800" height="533">

    <!-- Background -->
    <rect width="800" height="533" fill="#EBEBEB"/>

    <!-- Decorative accent circles -->
    <circle cx="60" cy="50" r="10" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    <circle cx="740" cy="70" r="7" fill="#D1D5DB" opacity="0.4"/>
    <circle cx="720" cy="480" r="12" fill="none" stroke="#D1D5DB" stroke-width="1"/>
    <circle cx="90" cy="490" r="5" fill="#D1D5DB" opacity="0.5"/>

    <!-- ===== LEFT: Declined application (faded/crossed out) ===== -->
    <g transform="translate(50, 100)">
      <!-- Application document -->
      <rect x="0" y="0" width="150" height="200" rx="6" fill="#FFFFFF" stroke="#6B7280" stroke-width="1.5" opacity="0.7"/>

      <!-- Header -->
      <rect x="0" y="0" width="150" height="26" rx="6" fill="#6B7280" opacity="0.5"/>
      <rect x="0" y="20" width="150" height="6" fill="#6B7280" opacity="0.5"/>
      <text x="75" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#FFFFFF" letter-spacing="0.04em">APPLICATION</text>

      <!-- Form lines -->
      <line x1="16" y1="44" x2="134" y2="44" stroke="#D1D5DB" stroke-width="1"/>
      <line x1="16" y1="60" x2="110" y2="60" stroke="#D1D5DB" stroke-width="1"/>
      <line x1="16" y1="76" x2="124" y2="76" stroke="#D1D5DB" stroke-width="1"/>
      <line x1="16" y1="92" x2="100" y2="92" stroke="#D1D5DB" stroke-width="1"/>
      <line x1="16" y1="108" x2="130" y2="108" stroke="#D1D5DB" stroke-width="1"/>
      <line x1="16" y1="124" x2="90" y2="124" stroke="#D1D5DB" stroke-width="1"/>

      <!-- Score box -->
      <rect x="16" y="142" width="60" height="32" rx="3" fill="#EBEBEB" stroke="#D1D5DB" stroke-width="1"/>
      <text x="46" y="155" text-anchor="middle" font-family="SF Mono, monospace" font-size="7" fill="#6B7280">SCORE</text>
      <text x="46" y="168" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" font-weight="700" fill="#6B7280">Below</text>

      <!-- Big X stamp (declined) -->
      <g opacity="0.6">
        <line x1="20" y1="30" x2="130" y2="170" stroke="#3A3F47" stroke-width="5" stroke-linecap="round"/>
        <line x1="130" y1="30" x2="20" y2="170" stroke="#3A3F47" stroke-width="5" stroke-linecap="round"/>
      </g>

      <!-- DECLINED stamp -->
      <g transform="rotate(-15, 75, 100)">
        <rect x="20" y="82" width="110" height="32" rx="4" fill="none" stroke="#3A3F47" stroke-width="2.5"/>
        <text x="75" y="103" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#3A3F47" letter-spacing="0.08em">DECLINED</text>
      </g>

      <!-- Label -->
      <text x="75" y="224" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6B7280">Rules-based decline</text>
    </g>

    <!-- ===== CENTER: Chat agent / conversation (the transformation) ===== -->
    <g transform="translate(280, 70)">
      <!-- Chat window frame -->
      <rect x="0" y="0" width="220" height="340" rx="12" fill="#FFFFFF" stroke="#23262C" stroke-width="2"/>

      <!-- Title bar -->
      <rect x="0" y="0" width="220" height="36" rx="12" fill="#23262C"/>
      <rect x="0" y="24" width="220" height="12" fill="#23262C"/>
      <!-- Macy avatar (warm gradient + person silhouette) -->
      <defs>
        <linearGradient id="macyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#E8D5C8"/>
          <stop offset="100%" stop-color="#D4B59E"/>
        </linearGradient>
      </defs>
      <circle cx="24" cy="18" r="10" fill="url(#macyGrad)"/>
      <circle cx="24" cy="15" r="3.5" fill="none" stroke="#8B6F5C" stroke-width="1.2"/>
      <path d="M17 25 C17 21, 20 19, 24 19 C28 19, 31 21, 31 25" fill="none" stroke="#8B6F5C" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Agent name -->
      <text x="42" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF">Macy</text>
      <text x="42" y="28" font-family="Inter, sans-serif" font-size="8" fill="#6B7280">AI Intake Agent</text>
      <!-- ChatAdvance logo (chat bubble icon + wordmark, right-aligned) -->
      <g transform="translate(140, 8)">
        <!-- Chat bubble icon (simplified from ChatAdvance logo) -->
        <g transform="scale(0.28)" fill="#427CB3">
          <path d="M55 0.5C58.8 0.5 62.3 1.4 64.8 3.8C67.3 6.2 68.4 9.6 68.5 13.4V40.2C68.5 44.2 67.6 47.7 65 50.3C62.5 52.9 59 53.9 55 53.9H36.5L24.2 69.3C23.4 70.4 21.9 70.8 20.6 70.4C19.3 69.9 18.4 68.7 18.4 67.3V53.9H14C10.1 53.9 6.5 52.9 4 50.3C1.5 47.7 0.5 44.2 0.5 40.2V14.2C0.5 10.2 1.5 6.6 4 4.1C6.5 1.5 10.1 0.5 14 0.5H55ZM14 7C11.1 7 9.5 7.7 8.6 8.6C7.7 9.5 7 11.2 7 14.2V40.2C7 43.2 7.7 44.8 8.6 45.7C9.5 46.6 11.1 47.4 14 47.4H21.7C23.5 47.4 25 48.8 25 50.6V58L32.2 48.9C32.4 48.5 32.8 48.2 33.1 48C33.7 47.6 34.4 47.4 35.1 47.4H55C57.9 47.4 59.5 46.6 60.4 45.7C61.3 44.9 62 43.3 62 40.6V39.1L62 37V26.9L62 17.8V13.6C61.9 10.9 61.2 9.4 60.3 8.5C59.4 7.7 57.9 7 55 7H14Z"/>
        </g>
        <!-- "ChatAdvance" text -->
        <text x="24" y="13" font-family="Inter, sans-serif" font-size="7.5" font-weight="600" letter-spacing="0.01em">
          <tspan fill="#427CB3">Chat</tspan><tspan fill="#FA6E44">Advance</tspan>
        </text>
      </g>

      <!-- Chat messages -->
      <!-- Agent message 1 -->
      <rect x="16" y="50" width="140" height="28" rx="8" fill="#EBEBEB"/>
      <text x="26" y="62" font-family="Inter, sans-serif" font-size="8" fill="#3A3F47">Hi! Let's review your</text>
      <text x="26" y="72" font-family="Inter, sans-serif" font-size="8" fill="#3A3F47">application together.</text>

      <!-- User message -->
      <rect x="64" y="90" width="140" height="28" rx="8" fill="#3A3F47"/>
      <text x="74" y="102" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF">Here are my bank</text>
      <text x="74" y="112" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF">statements</text>

      <!-- Document attachment icons -->
      <g transform="translate(80, 126)">
        <rect x="0" y="0" width="104" height="20" rx="4" fill="#2E3138"/>
        <rect x="4" y="4" width="10" height="12" rx="1" fill="none" stroke="#6B7280" stroke-width="0.8"/>
        <text x="20" y="13" font-family="SF Mono, monospace" font-size="7" fill="#9CA3AF">bank_oct.pdf</text>
      </g>

      <!-- Agent message 2 - analysis -->
      <rect x="16" y="158" width="150" height="28" rx="8" fill="#EBEBEB"/>
      <text x="26" y="170" font-family="Inter, sans-serif" font-size="8" fill="#3A3F47">Analyzing 3 months of</text>
      <text x="26" y="180" font-family="Inter, sans-serif" font-size="8" fill="#3A3F47">deposits and revenue...</text>

      <!-- Agent message 3 - enrichment -->
      <rect x="16" y="198" width="160" height="20" rx="8" fill="#EBEBEB"/>
      <text x="26" y="212" font-family="Inter, sans-serif" font-size="8" fill="#3A3F47">Cross-referencing data ✓</text>

      <!-- Agent message 4 - offers! -->
      <rect x="16" y="232" width="188" height="72" rx="8" fill="#EBEBEB" stroke="#3A3F47" stroke-width="1"/>
      <text x="26" y="248" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#23262C">2 offers from funders</text>

      <!-- Offer rows -->
      <line x1="26" y1="256" x2="194" y2="256" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="26" y="270" font-family="SF Mono, monospace" font-size="8" font-weight="600" fill="#3A3F47">$100K</text>
      <text x="72" y="270" font-family="Inter, sans-serif" font-size="7" fill="#6B7280">26 wks</text>
      <text x="110" y="270" font-family="Inter, sans-serif" font-size="7" fill="#6B7280">1.25x</text>

      <text x="26" y="286" font-family="SF Mono, monospace" font-size="8" font-weight="600" fill="#3A3F47">$80K</text>
      <text x="72" y="286" font-family="Inter, sans-serif" font-size="7" fill="#6B7280">34 wks</text>
      <text x="110" y="286" font-family="Inter, sans-serif" font-size="7" fill="#6B7280">1.34x</text>

      <!-- Timestamp -->
      <text x="110" y="322" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#D1D5DB">< 5 minutes</text>

      <!-- Label -->
      <text x="110" y="368" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#23262C">Agentic intake</text>
    </g>

    <!-- ===== RIGHT: Funded result (approved, dark/present) ===== -->
    <g transform="translate(570, 120)">
      <!-- Approval document -->
      <rect x="0" y="0" width="160" height="180" rx="6" fill="#FFFFFF" stroke="#23262C" stroke-width="2"/>

      <!-- Header -->
      <rect x="0" y="0" width="160" height="26" rx="6" fill="#23262C"/>
      <rect x="0" y="20" width="160" height="6" fill="#23262C"/>
      <text x="80" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#FFFFFF" letter-spacing="0.04em">FUNDED</text>

      <!-- Checkmark badge -->
      <circle cx="140" cy="14" r="9" fill="#3A3F47" stroke="#23262C" stroke-width="1"/>
      <polyline points="134,14 138,18 146,10" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Deal details -->
      <text x="16" y="48" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#3A3F47">FUNDING AMOUNT</text>
      <text x="16" y="64" font-family="SF Mono, monospace" font-size="18" font-weight="700" fill="#23262C">$100,000</text>

      <line x1="16" y1="76" x2="144" y2="76" stroke="#D1D5DB" stroke-width="1"/>

      <text x="16" y="92" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#6B7280">TERM</text>
      <text x="16" y="106" font-family="SF Mono, monospace" font-size="12" font-weight="600" fill="#3A3F47">26 weeks</text>

      <text x="90" y="92" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#6B7280">FACTOR</text>
      <text x="90" y="106" font-family="SF Mono, monospace" font-size="12" font-weight="600" fill="#3A3F47">1.25x</text>

      <line x1="16" y1="116" x2="144" y2="116" stroke="#D1D5DB" stroke-width="1"/>

      <text x="16" y="132" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#6B7280">TIME TO FUND</text>
      <text x="16" y="148" font-family="SF Mono, monospace" font-size="14" font-weight="700" fill="#23262C">< 5 min</text>

      <!-- Progress bar (full) -->
      <rect x="16" y="160" width="128" height="6" rx="3" fill="#23262C"/>

      <!-- Label -->
      <text x="80" y="204" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#23262C">Deal funded</text>
    </g>

    <!-- ===== Flow arrows ===== -->
    <!-- Left to center -->
    <g stroke="#3A3F47" stroke-width="1.5">
      <line x1="212" y1="266" x2="270" y2="266" stroke-dasharray="6,4"/>
      <polygon points="266,262 274,266 266,270" fill="#3A3F47"/>
    </g>

    <!-- Center to right -->
    <g stroke="#3A3F47" stroke-width="1.5">
      <line x1="510" y1="266" x2="560" y2="246" stroke-dasharray="6,4"/>
      <polygon points="554,244 562,244 558,252" fill="#3A3F47"/>
    </g>

  </svg>
</body>
</html>
